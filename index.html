<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachy Team | Creative & Passionate</title>
    <!-- Import modern font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Peachy gradient background */
        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            overflow: hidden;
        }

        /* Glassmorphism container */
        .container {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 3rem 4rem;
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(255, 126, 103, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeUp 1s ease-out;
        }

        /* Bouncing peach icon */
        .icon {
            font-size: 5rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: bounce 2s infinite ease-in-out;
            filter: drop-shadow(0 10px 10px rgba(255, 107, 107, 0.3));
        }

        /* Main heading */
        h1 {
            font-size: 2.8rem;
            color: #ff6b6b;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* Description text */
        p {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        /* Animations */
        @keyframes fadeUp {
            from { 
                opacity: 0; 
                transform: translateY(40px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Floating background bubbles */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        .bubble:nth-child(1) { width: 100px; height: 100px; top: 10%; left: 15%; animation-delay: 0s; }
        .bubble:nth-child(2) { width: 150px; height: 150px; top: 70%; left: 80%; animation-delay: 2s; }
        .bubble:nth-child(3) { width: 60px; height: 60px; top: 40%; left: 85%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
    </style>
</head>
<body>

    <!-- Floating background bubbles -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="icon">🍑</div>
        <h1>Peachy Team</h1>
        <p>Hello world! 🌍<br>We are a passionate and creative team, always ready to build the sweetest and most amazing products.</p>
    </div>

</body>
</html>
